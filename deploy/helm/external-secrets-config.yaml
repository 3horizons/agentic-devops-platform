# =============================================================================
# ClusterSecretStore — Azure Key Vault via Service Principal
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      tenantId: "2fdc24aa-9deb-40a8-a662-d7f5ad81f447"
      vaultUrl: "https://kv-threehorizons-dev.vault.azure.net/"
      authSecretRef:
        clientId:
          name: azure-sp-credentials
          namespace: external-secrets
          key: client-id
        clientSecret:
          name: azure-sp-credentials
          namespace: external-secrets
          key: client-secret
---
# =============================================================================
# ExternalSecret — Sync all platform secrets from KV to backstage namespace
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rhdh-platform-secrets
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: rhdh-platform-secrets
    creationPolicy: Owner
  data:
    - secretKey: postgres-host
      remoteRef:
        key: postgres-host
    - secretKey: postgres-user
      remoteRef:
        key: postgres-user
    - secretKey: postgres-password
      remoteRef:
        key: postgres-password
    - secretKey: postgres-database
      remoteRef:
        key: postgres-database
    - secretKey: redis-host
      remoteRef:
        key: redis-host
    - secretKey: ai-services-key
      remoteRef:
        key: ai-services-key
    - secretKey: ai-services-endpoint
      remoteRef:
        key: ai-services-endpoint
    # Lightspeed — Azure OpenAI credentials
    - secretKey: AZURE_OPENAI_ENDPOINT
      remoteRef:
        key: openai-endpoint
    - secretKey: AZURE_OPENAI_KEY
      remoteRef:
        key: openai-api-key
    # GitHub OAuth — Portal authentication
    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: rhdh-github-client-id
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: rhdh-github-client-secret
    # GitHub Copilot Metrics — Proxy to Copilot API
    - secretKey: GITHUB_COPILOT_TOKEN
      remoteRef:
        key: github-copilot-token
    # GitHub Security — Proxy to GHAS API + backend aggregation
    - secretKey: GITHUB_SECURITY_TOKEN
      remoteRef:
        key: github-security-token
---
# =============================================================================
# ExternalSecret — AI secrets for monitoring namespace (SRE dashboards)
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: platform-secrets
    creationPolicy: Owner
  data:
    - secretKey: ai-services-endpoint
      remoteRef:
        key: ai-services-endpoint
