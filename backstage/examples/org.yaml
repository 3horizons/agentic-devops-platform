# Three Horizons - Organization Entities
# NOTE: User entities (e.g. paulanunes85) are now provisioned automatically
# by the GithubMultiOrgEntityProvider from the 3horizons GitHub org.
# Only define Groups, Domains, and Systems here.
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  description: Three Horizons Platform Engineering Team
spec:
  type: team
  profile:
    displayName: Platform Team
  children: []
  members:
    - paulanunes85
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-engineering
  description: Platform Engineering Team
spec:
  type: team
  profile:
    displayName: Platform Engineering
  parent: platform-team
  children: []
  members:
    - paulanunes85
---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: three-horizons
  description: Agentic DevOps Platform
spec:
  owner: platform-team
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: developer-hub
  description: Internal Developer Platform powered by Red Hat Developer Hub
spec:
  owner: platform-team
  domain: three-horizons
