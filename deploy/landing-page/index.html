<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Horizons — Developer Hub</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 23 23'><rect x='1' y='1' width='10' height='10' fill='%23F25022'/><rect x='12' y='1' width='10' height='10' fill='%237FBA00'/><rect x='1' y='12' width='10' height='10' fill='%2300A4EF'/><rect x='12' y='12' width='10' height='10' fill='%23FFB900'/></svg>">
    <style>
:root {
    --ms-blue: #00A4EF; --ms-green: #7FBA00; --ms-yellow: #FFB900; --ms-red: #F25022; --ms-dark-blue: #0078D4;
    --bg-primary: #FFFFFF; --bg-secondary: #F8F9FA; --text-primary: #1B1B1F; --text-secondary: #5C5C5C; --text-tertiary: #9A9A9A; --text-inverse: #FFFFFF;
    --border-light: #E8E8E8; --border-lighter: #F0F0F0;
    --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --fs-xs: 11px; --fs-sm: 12px; --fs-base: 14px; --fs-md: 15px; --fs-lg: 18px; --fs-xl: 24px; --fs-2xl: 32px; --fs-hero: 42px;
    --sp-xs: 4px; --sp-sm: 8px; --sp-md: 16px; --sp-lg: 24px; --sp-xl: 32px; --sp-2xl: 48px;
    --r-sm: 6px; --r-md: 8px; --r-lg: 12px;
    --sh-md: 0 4px 12px rgba(0,0,0,0.08); --sh-hover: 0 8px 20px rgba(0,0,0,0.12);
    --color-bar-h: 4px;
    --color-bar: linear-gradient(to right, var(--ms-red) 0%, var(--ms-red) 25%, var(--ms-green) 25%, var(--ms-green) 50%, var(--ms-blue) 50%, var(--ms-blue) 75%, var(--ms-yellow) 75%, var(--ms-yellow) 100%);
    --t-fast: 0.15s ease; --t-base: 0.25s ease;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: var(--bg-primary); font-family: var(--font-family); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
.color-bar { position: fixed; top: 0; left: 0; width: 100%; height: var(--color-bar-h); background: var(--color-bar); z-index: 1000; }
body { padding-top: var(--color-bar-h); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { width: 100%; max-width: 460px; padding: var(--sp-lg); text-align: center; }
.login-logo { margin-bottom: var(--sp-xl); animation: fadeIn 0.6s ease; }
.login-logo svg { width: 68px; height: 68px; }
.login-title { font-size: var(--fs-hero); font-weight: 700; margin-bottom: var(--sp-sm); animation: fadeIn 0.6s ease 0.1s both; }
.login-sub { font-size: var(--fs-md); color: var(--text-secondary); margin-bottom: var(--sp-xs); animation: fadeIn 0.6s ease 0.15s both; }
.login-tag { font-size: var(--fs-sm); color: var(--text-tertiary); margin-bottom: var(--sp-2xl); animation: fadeIn 0.6s ease 0.2s both; }
.login-btn { width: 100%; height: 52px; background: #24292e; color: #FFF; border: none; border-radius: var(--r-md); font-size: var(--fs-md); font-weight: 600; font-family: var(--font-family); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all var(--t-base); box-shadow: var(--sh-md); animation: fadeIn 0.6s ease 0.3s both; text-decoration: none; }
.login-btn:hover { background: #2f363d; box-shadow: var(--sh-hover); transform: translateY(-2px); }
.login-btn svg { width: 20px; height: 20px; }
.login-info { font-size: var(--fs-sm); color: var(--text-tertiary); margin: var(--sp-lg) 0 var(--sp-2xl); line-height: 1.6; animation: fadeIn 0.6s ease 0.4s both; }
.login-horizons { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-md); margin-bottom: var(--sp-2xl); }
.lh-card { background: var(--bg-primary); border: 1px solid var(--border-light); border-radius: var(--r-md); padding: 18px 14px; border-top: 3px solid; transition: all var(--t-base); }
.lh-card:nth-child(1) { border-top-color: var(--ms-blue); animation: fadeIn 0.5s ease 0.5s both; }
.lh-card:nth-child(2) { border-top-color: var(--ms-green); animation: fadeIn 0.5s ease 0.6s both; }
.lh-card:nth-child(3) { border-top-color: var(--ms-yellow); animation: fadeIn 0.5s ease 0.7s both; }
.lh-card:hover { transform: translateY(-3px); box-shadow: var(--sh-hover); }
.lh-icon { font-size: 26px; margin-bottom: var(--sp-sm); }
.lh-title { font-size: var(--fs-sm); font-weight: 700; margin-bottom: 3px; }
.lh-desc { font-size: var(--fs-xs); color: var(--text-secondary); line-height: 1.4; }
.login-footer { font-size: var(--fs-xs); color: var(--text-tertiary); border-top: 1px solid var(--border-lighter); padding-top: var(--sp-lg); animation: fadeIn 0.6s ease 0.8s both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 540px) { .login-title { font-size: var(--fs-2xl); } .login-horizons { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="color-bar"></div>
<div class="login-box">
    <div class="login-logo"><svg viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="10" height="10" fill="#F25022"/><rect x="12" y="1" width="10" height="10" fill="#7FBA00"/><rect x="1" y="12" width="10" height="10" fill="#00A4EF"/><rect x="12" y="12" width="10" height="10" fill="#FFB900"/></svg></div>
    <h1 class="login-title">Three Horizons</h1>
    <p class="login-sub">Developer Hub</p>
    <p class="login-tag">Powered by Red Hat® Developer Hub</p>
    <a class="login-btn" href="https://rhdh.3horizons.ai">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        Sign in with GitHub
    </a>
    <p class="login-info"></p>
    <div class="login-horizons">
        <div class="lh-card"><div class="lh-icon">🔨</div><div class="lh-title">Foundation</div><div class="lh-desc">Core infrastructure & CI/CD</div></div>
        <div class="lh-card"><div class="lh-icon">⚡</div><div class="lh-title">Intelligence</div><div class="lh-desc">AI-powered dev tools</div></div>
        <div class="lh-card"><div class="lh-icon">🚀</div><div class="lh-title">Autonomy</div><div class="lh-desc">Self-healing operations</div></div>
    </div>
    <div class="login-footer">Microsoft · GitHub · Red Hat</div>
</div>
</body>
</html>
