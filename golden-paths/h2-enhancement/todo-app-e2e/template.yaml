apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: h2-todo-app-e2e
  title: "H2: Todo App E2E Demo"
  description: |
    Golden Path for an end-to-end demo: creates a GitHub repository,
    publishes a Todo App with Codespaces, and generates Terraform IaC for Azure dev.
  tags:
    - h2-enhancement
    - demo
    - todo-app
    - github
    - azure
    - iac
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: platform-engineering
  type: service

  parameters:
    - title: Application Information
      required:
        - appName
        - owner
        - description
      properties:
        appName:
          title: Application name
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          default: todo-app
          maxLength: 40
        description:
          title: Description
          type: string
          default: Three Horizons end-to-end demo with Todo App
          maxLength: 300
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              - kind: Group
              - kind: User
        system:
          title: System
          type: string
          default: developer-hub

    - title: GitHub Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Target repository
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
        repoVisibility:
          title: Visibility
          type: string
          default: private
          enum:
            - private
            - internal
            - public
          enumNames:
            - Private
            - Internal
            - Public

    - title: Azure IaC (Dev Environment)
      required:
        - azureRegion
        - costCenter
      properties:
        azureRegion:
          title: Azure region
          type: string
          default: centralus
          enum:
            - centralus
            - eastus
            - eastus2
            - southcentralus
            - brazilsouth
        environment:
          title: Environment
          type: string
          default: dev
          enum:
            - dev
        costCenter:
          title: Cost Center
          type: string
          default: TH0001
          pattern: '^[A-Z]{2}[0-9]{4}$'
        deployToAzureInWorkflow:
          title: Enable Azure IaC deployment workflow
          type: boolean
          default: true

  steps:
    - id: fetch-base
      name: Generate Todo App baseline
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          repoOwner: ${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}
          repoName: ${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
          azureRegion: ${{ parameters.azureRegion }}
          environment: ${{ parameters.environment }}
          costCenter: ${{ parameters.costCenter }}
          deployToAzureInWorkflow: ${{ parameters.deployToAzureInWorkflow }}

    - id: publish
      name: Create GitHub repository
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        repoVisibility: ${{ parameters.repoVisibility }}
        description: ${{ parameters.description }}
        defaultBranch: main

    - id: create-environment
      name: Create dev environment
      action: github:environment:create
      input:
        repoUrl: ${{ parameters.repoUrl }}
        name: dev

    - id: bootstrap-oidc
      name: Bootstrap Azure OIDC for new repository
      action: github:actions:dispatch
      input:
        repoUrl: github.com?owner=3horizons&repo=agentic-devops-platform
        workflowId: oidc-bootstrap.yml
        branchOrTagName: main
        workflowInputs:
          targetRepoOwner: ${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}
          targetRepoName: ${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
          targetEnvironment: dev

    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Created repository
        url: https://github.com/${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: Open in Codespaces
        url: https://github.com/${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}/codespaces
      - title: Dev IaC Workflow
        url: https://github.com/${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}/actions/workflows/iac-dev.yml
    text:
      - title: E2E demo created successfully
        content: |
          ## Todo App ready for end-to-end demo

          **Repository:** ${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
          **IaC environment:** ${{ parameters.environment }}
          **Azure region:** ${{ parameters.azureRegion }}

          **Azure IaC is ready to use:**
           - Organization secrets `AZURE_CLIENT_ID`, `AZURE_TENANT_ID`, `AZURE_SUBSCRIPTION_ID` inherited automatically
           - Environment `dev` created in the repository
           - OIDC bootstrap workflow dispatched automatically from `3horizons/agentic-devops-platform`
           - Run workflow `iac-dev.yml` with `apply=true` to provision Azure resources

          **OIDC bootstrap note:**
          the template dispatches an org-level workflow that creates federated credential subject
          `repo:<owner>/<repo>:environment:dev` in app `three-horizons-github-oidc`.

          Fallback (manual only if bootstrap workflow fails):
          `az ad app federated-credential create --id <APP_OBJECT_ID> --parameters '{"name":"github-${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}-dev","issuer":"https://token.actions.githubusercontent.com","subject":"repo:${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}:environment:dev","audiences":["api://AzureADTokenExchange"]}'`

           **Identity note:** ensure the selected owner (`User` or `Group`) exists in the Software Catalog.

          **Codespaces:** use the "Open in Codespaces" link above to launch the dev environment for the created repository.
